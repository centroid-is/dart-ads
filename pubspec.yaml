name: dart_ads
description: >-
  Pure-Dart client library for the Beckhoff ADS protocol (AMS/TCP),
  reimplementing the open-source Beckhoff C++ AdsLib in Dart-only code.
version: 0.0.1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  # Annotations only (zero runtime cost): @visibleForTesting on internal seams.
  meta: ^1.16.0

dev_dependencies:
  test: ^1.31.0
  lints: ^6.1.0
