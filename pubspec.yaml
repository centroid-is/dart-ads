name: dart_ads
description: >-
  Pure-Dart Beckhoff ADS (AMS/TCP) client — read/write/subscribe PLC variables,
  symbol browse, sum commands, plus the `ads` CLI. Wire-compatible with the C++
  AdsLib, validated byte-for-byte.
version: 0.1.0

# No homepage/repository yet (no public remote) — omitting them keeps
# `dart pub publish --dry-run` warning-free.

topics:
  - ads
  - beckhoff
  - twincat
  - plc
  - industrial-automation

# Native VM + Flutter desktop/mobile only. ADS is raw TCP; there is no web
# support by design (dart:html has no socket access).
platforms:
  linux:
  macos:
  windows:
  android:
  ios:

environment:
  sdk: '>=3.5.0 <4.0.0'

# The `ads` CLI entrypoint (bin/ads.dart). Lets `dart pub global activate` yield
# an `ads` binary.
executables:
  ads: ads

dependencies:
  # Annotations only (zero runtime cost): @visibleForTesting on internal seams.
  meta: ^1.16.0
  # CLI arg parsing + CommandRunner/Command for the seven ADS verbs.
  args: ^2.7.0

dev_dependencies:
  test: ^1.31.0
  lints: ^6.1.0
